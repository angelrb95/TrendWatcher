{% extends "base.html" %}
{% block content %}
<section class="auth-shell single">
  <article class="auth-card">
    <p class="eyebrow">Recuperar acceso</p>
    <h1>Restablecer contraseña</h1>
    <p>Escribe tu usuario o email y te enviaremos un enlace para crear una contraseña nueva.</p>
    <form method="post" class="form-stack">
      <label>Usuario o email
        <input name="identifier" autocomplete="username" required>
      </label>
      <button type="submit">Enviar enlace</button>
    </form>
    <p class="auth-link"><a href="{{ url_for('login') }}">Volver a entrar</a></p>
  </article>
</section>
{% endblock %}
